name: API 测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bruno-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 Bruno CLI
        run: npm install -g @usebruno/cli

      - name: 跑接口测试
        run: bru run --env production --reporter-junit junit.xml

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: junit.xml
